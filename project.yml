name: GlobeDisplay
options:
  bundleIdPrefix: com.globedisplay
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

targets:
  GlobeDisplay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GlobeDisplay
        excludes:
          - "**/*.md"
    info:
      path: GlobeDisplay/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiredDeviceCapabilities:
          - metal
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.globedisplay.app
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "2"

  GlobeDisplayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GlobeDisplayTests
    dependencies:
      - target: GlobeDisplay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.globedisplay.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GlobeDisplay.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/GlobeDisplay"

  GlobeDisplayUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GlobeDisplayUITests
    dependencies:
      - target: GlobeDisplay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.globedisplay.uitests
        TEST_TARGET_NAME: GlobeDisplay
